name: PR Check

on:
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json

      - run: npm ci
      
      # Generates Prisma client types so 'typecheck' doesn't fail
      - run: npx prisma generate 
      
      - run: npm run lint
      - run: npm run prettier:check || echo "Prettier check failed or script missing"
      - run: npm run typecheck

  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-app
    steps:
      - uses: actions/checkout@v4

      # Installs pnpm onto the virtual environment
      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web-app/pnpm-lock.yaml

      # Replaced npm commands with their frozen pnpm equivalents
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run prettier:check || echo "Prettier check failed or script missing"
      
      # Native Next.js/TypeScript fallback check if your package.json lacks a custom "typecheck" script
      - run: pnpm run typecheck || pnpm exec tsc --noEmit
